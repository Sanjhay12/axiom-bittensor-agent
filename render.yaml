services:
  - type: web
    name: axiom-bittensor-agent
    runtime: docker
    dockerfilePath: ./Dockerfile
    region: oregon
    plan: starter
    disk:
      name: axiom-data
      mountPath: /data
      sizeGB: 1
    envVars:
      - key: DATA_DIR
        value: /data
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: DISCORD_TOKEN
        sync: false
      - key: DISCORD_GUILD_ID
        sync: false
      - key: TWITTER_BEARER_TOKEN
        sync: false
      - key: DATABASE_URL
        sync: false
      - key: CRM_IMAP_HOST
        sync: false
      - key: CRM_IMAP_USER
        sync: false
      - key: CRM_IMAP_PASSWORD
        sync: false
      - key: OWNER_EMAIL
        sync: false
      - key: CRM_SMTP_HOST
        sync: false
      - key: CRM_SMTP_USER
        sync: false
      - key: CRM_SMTP_PASSWORD
        sync: false
      - key: PROXYCURL_API_KEY
        sync: false
      - key: PERPLEXITY_API_KEY
        sync: false
      - key: CRUNCHBASE_API_KEY
        sync: false
